<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Map — Explore Lori</title>
  <meta name="description" content="Interactive map of Lori Province — explore all 7 geographical circuits, monasteries, fortresses, gorges, and cultural landmarks.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    /* Page-scoped styles — only apply to the map page */
    body { overflow: hidden; }
    .discover-layout { display: flex; flex-direction: column; height: 100vh; }
    .discover-layout .site-header { flex-shrink: 0; }
    .map-stage { flex: 1; display: flex; position: relative; overflow: hidden; }
    #map { flex: 1; }

    /* Filter bar */
    .filter-bar {
      position: absolute;
      top: var(--space-sm);
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 0.375rem;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(242, 237, 227, 0.95);
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--stone);
      backdrop-filter: blur(4px);
      max-width: calc(100vw - 2rem);
    }
    .filter-btn {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border: 2px solid transparent;
      cursor: pointer;
      transition: opacity 0.15s;
      color: #fff;
      border-radius: 2px;
    }
    .filter-btn.inactive { opacity: 0.4; }

    /* Detail panel */
    .detail-panel {
      position: absolute;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100%;
      background: var(--parchment);
      border-left: 1px solid var(--stone);
      z-index: 900;
      overflow-y: auto;
      transition: right 0.3s ease;
    }
    .detail-panel.open { right: 0; }
    .panel-close {
      position: absolute;
      top: var(--space-sm);
      right: var(--space-sm);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--slate);
      line-height: 1;
    }
    .panel-body {
      padding: var(--space-md);
      padding-top: 3rem;
    }
    .panel-type {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: var(--space-xs);
    }
    .panel-name {
      font-family: var(--font-serif);
      font-size: 1.375rem;
      color: var(--green);
      margin-bottom: var(--space-xs);
      line-height: 1.2;
    }
    .panel-season {
      font-size: 0.875rem;
      color: var(--ochre);
      font-family: var(--font-sans);
      margin-bottom: var(--space-sm);
    }
    .panel-hook {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--dark);
      margin-bottom: var(--space-md);
    }
    .panel-read-more { margin-top: var(--space-md); }
  </style>
</head>
<body>
  <div class="discover-layout">

    <!-- GLOBAL HEADER -->
    <header class="site-header">
      <div class="container">
        <a href="/" class="site-logo"><span class="logo-explore">Explore </span>Lori</a>
        <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
          <a href="/stories/">The Chronicle</a>
          <a href="/discover/" class="active">The Map</a>
          <a href="/plan/">Getting Here</a>
          <a href="/events/">Regional Briefings</a>
          <a href="/about/">About</a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>

    <!-- MAP STAGE -->
    <div class="map-stage">

      <!-- Circuit filter buttons (injected by map.js after data loads) -->
      <div class="filter-bar" id="filter-bar" role="toolbar" aria-label="Filter locations by circuit"></div>

      <!-- Leaflet map container -->
      <div id="map" aria-label="Interactive map of Lori Province locations"></div>

      <!-- Slide-in detail panel -->
      <aside class="detail-panel" id="detail-panel" aria-live="polite" aria-label="Location details">
        <button class="panel-close" id="panel-close" aria-label="Close location details">&times;</button>
        <div class="panel-body" id="panel-body">
          <!-- Content injected by map.js on marker click -->
        </div>
      </aside>

    </div>
  </div>

  <!-- Leaflet 1.9.4 -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqM=" crossorigin=""></script>
  <script src="/js/nav.js"></script>
  <script src="/js/map.js"></script>
</body>
</html>
