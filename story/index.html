<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story — Explore Lori</title>
  <meta name="description" content="A story from Lori Province, Northern Armenia.">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── STORY HERO ── */
    .story-hero {
      height: 55vh;
      min-height: 340px;
      position: relative;
      overflow: hidden;
    }
    .story-hero-bg {
      position: absolute;
      inset: 0;
    }
    .hero-back {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      background: rgba(44,51,64,0.55);
      backdrop-filter: blur(4px);
      padding: 0.4rem 0.875rem;
      z-index: 2;
      transition: background 0.2s;
    }
    .hero-back:hover { background: rgba(44,51,64,0.8); color: #fff; }
    .hero-season-badge {
      position: absolute;
      bottom: 1.25rem;
      left: 1.5rem;
      background: rgba(44,51,64,0.75);
      backdrop-filter: blur(4px);
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ochre);
      padding: 0.3rem 0.75rem;
      z-index: 2;
    }
    .hero-caption {
      position: absolute;
      bottom: 1.25rem;
      right: 1.5rem;
      font-family: var(--font-sans);
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      z-index: 2;
    }

    /* ── STORY BODY ── */
    .story-body {
      max-width: 760px;
      margin: 0 auto;
      padding: 3rem var(--space-sm) 4rem;
    }
    .story-meta-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .pillar-tag {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ochre);
    }
    .dot { color: var(--stone); font-size: 0.5rem; }
    .cbadge {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
    }
    .sbadge {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--slate);
      border: 1px solid var(--stone);
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
    }
    .story-date {
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      color: var(--slate);
      margin-left: auto;
    }
    .story-title {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      color: var(--green);
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .story-lede {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.125rem;
      color: var(--slate);
      line-height: 1.65;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--stone);
    }
    .story-prose p {
      font-family: var(--font-sans);
      font-size: 1.0625rem;
      line-height: 1.8;
      color: var(--dark);
      margin-bottom: 1.5rem;
    }
    .story-prose .pull-quote {
      font-family: var(--font-serif);
      font-size: clamp(1.25rem, 2.5vw, 1.6rem);
      color: var(--green);
      border-left: 4px solid var(--ochre);
      padding-left: 1.5rem;
      margin: 2.5rem 0;
      line-height: 1.4;
    }

    /* ── STORY BLOCK FIGURES ── */
    .story-block-fig {
      margin: 2rem 0;
    }
    .story-block-fig img {
      width: 100%;
      display: block;
      border-radius: 4px;
    }
    .story-block-fig figcaption {
      font-size: 0.8rem;
      color: var(--slate);
      margin-top: 0.5rem;
      font-style: italic;
    }

    /* ── BLOCK: HEADING ── */
    .story-prose h2 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--green);
      margin: 2.5rem 0 0.75rem;
      line-height: 1.2;
    }
    .story-prose h3 {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--dark);
      margin: 2rem 0 0.5rem;
    }

    /* ── BLOCK: GALLERY ── */
    .story-gallery {
      display: grid;
      gap: 0.375rem;
      margin: 2rem 0;
    }
    .story-gallery.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .story-gallery.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .story-gallery.cols-4 { grid-template-columns: repeat(4, 1fr); }
    @media (max-width: 600px) {
      .story-gallery.cols-3,
      .story-gallery.cols-4 { grid-template-columns: repeat(2, 1fr); }
    }
    .story-gallery figure { margin: 0; }
    .story-gallery img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border-radius: 3px;
    }
    .story-gallery figcaption {
      font-size: 0.7rem;
      color: var(--slate);
      margin-top: 0.25rem;
      font-style: italic;
    }

    /* ── BLOCK: VIDEO ── */
    .story-video-wrap {
      margin: 2rem 0;
    }
    .story-video-embed {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 4px;
    }
    .story-video-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .story-video-self {
      width: 100%;
      display: block;
      border-radius: 4px;
      max-height: 540px;
    }
    .story-video-ambient {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      aspect-ratio: 16/9;
    }
    .story-video-ambient video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .story-video-ambient-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 1rem 1.25rem;
      background: linear-gradient(to top, rgba(10,12,16,0.6) 0%, transparent 60%);
    }
    .story-video-ambient-overlay span {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: #fff;
    }
    .story-video-shorts {
      max-width: 340px;
      margin: 0 auto;
      display: block;
      border-radius: 8px;
    }
    .story-video-caption {
      font-size: 0.8rem;
      color: var(--slate);
      margin-top: 0.5rem;
      font-style: italic;
    }

    /* ── BLOCK: DIVIDER ── */
    .story-divider-line {
      border: none;
      border-top: 1px solid var(--stone);
      margin: 2.5rem 0;
    }
    .story-divider-ornament {
      text-align: center;
      margin: 2.5rem 0;
      color: var(--ochre);
      font-size: 1.1rem;
      letter-spacing: 0.5em;
    }

    /* ── BLOCK: CALLOUT ── */
    .story-callout {
      border-left: 3px solid var(--ochre);
      background: #F5F0EA;
      padding: 1rem 1.25rem;
      border-radius: 0 4px 4px 0;
      margin: 1.5rem 0;
    }
    .story-callout-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ochre);
      margin-bottom: 0.4rem;
    }
    .story-callout.tip    { border-color: var(--green); }
    .story-callout.tip .story-callout-label { color: var(--green); }
    .story-callout.warning { border-color: #B8943A; background: #FBF6E8; }
    .story-callout.warning .story-callout-label { color: #B8943A; }

    /* ── BLOCK: MAP ── */
    .story-map-block {
      background: #EDE8DF;
      border: 1px solid var(--stone);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--dark);
      transition: background 0.15s;
    }
    .story-map-block:hover { background: #E5DFD5; }
    .story-map-block-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .story-map-block-text { flex: 1; }
    .story-map-block-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 0.25rem;
    }
    .story-map-block-name {
      font-family: var(--font-serif);
      font-size: 1rem;
    }
    .story-map-block-caption {
      font-size: 0.8rem;
      color: var(--slate);
      margin-top: 0.2rem;
    }
    .story-map-block-arrow {
      color: var(--slate);
      font-size: 1rem;
    }

    /* ── BLOCK: FULLWIDTH ── */
    .story-fullwidth {
      margin: 2rem calc(-1 * var(--space-sm));
      position: relative;
    }
    .story-fullwidth img {
      width: 100%;
      display: block;
      max-height: 70vh;
      object-fit: cover;
    }
    .story-fullwidth figcaption {
      font-size: 0.8rem;
      color: var(--slate);
      margin-top: 0.4rem;
      font-style: italic;
      padding: 0 var(--space-sm);
    }
    .story-fullwidth-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 1.5rem var(--space-sm);
      background: linear-gradient(to top, rgba(10,12,16,0.55) 0%, transparent 50%);
      pointer-events: none;
    }
    .story-fullwidth-overlay span {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      color: #fff;
      line-height: 1.3;
    }

    /* ── BLOCK: AUDIO ── */
    .story-audio-block {
      background: #F5F0EA;
      border: 1px solid var(--stone);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
    }
    .story-audio-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 0.5rem;
    }
    .story-audio-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: var(--dark);
    }
    .story-audio-block audio {
      width: 100%;
      margin-top: 0.25rem;
    }

    /* ── BLOCK: BEFORE/AFTER ── */
    .story-beforeafter {
      margin: 2rem 0;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      user-select: none;
    }
    .story-ba-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .story-ba-before {
      position: relative;
      display: block;
    }
    .story-ba-after {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .story-ba-after img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .story-ba-handle {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: #fff;
      cursor: ew-resize;
      z-index: 2;
    }
    .story-ba-handle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .story-ba-labels {
      position: absolute;
      bottom: 0.75rem;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 0.75rem;
      pointer-events: none;
    }
    .story-ba-label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }

    /* ── RELATED ── */
    .related-section {
      background: var(--sky);
      border-top: 1px solid var(--stone);
      padding: 3rem 0 4rem;
    }
    .related-label {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 1.5rem;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .card-a {
      background: #fff;
      border: 1px solid var(--stone);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-a:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .card-a-img { width: 100%; height: 180px; position: relative; }
    .card-a-season {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(44,51,64,0.65);
      backdrop-filter: blur(3px);
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      padding: 0.25rem 0.5rem;
    }
    .card-a-body { padding: 1.125rem 1.25rem 1.375rem; }
    .card-a-title {
      font-family: var(--font-serif);
      font-size: 1.0625rem;
      color: var(--green);
      line-height: 1.25;
      margin: 0.5rem 0 0.375rem;
    }
    .card-a-excerpt {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--slate);
      line-height: 1.5;
    }
    .card-a-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--stone);
    }
    .card-a-meta-sm { font-family: var(--font-sans); font-size: 0.75rem; color: var(--slate); }
    .read-link-sm {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ochre);
    }

    /* ── ERROR STATE ── */
    .story-error {
      text-align: center;
      padding: 6rem var(--space-sm);
      max-width: 520px;
      margin: 0 auto;
    }
    .story-error h1 {
      font-family: var(--font-serif);
      font-size: 2rem;
      color: var(--green);
      margin-bottom: 1rem;
    }
    .story-error p {
      color: var(--slate);
      margin-bottom: 1.5rem;
    }

    @media (max-width: 900px) {
      .related-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .related-grid { grid-template-columns: 1fr; }
      .story-body { padding: 2rem var(--space-sm) 3rem; }
    }
  </style>
</head>
<body>

  <!-- SHARED HEADER -->
  <header class="site-header" id="site-header"></header>

  <!-- CONTENT: injected by JS -->
  <main id="story-main"></main>

  <footer class="site-footer">
    <div class="container">
      <div>
        <p class="footer-brand">Explore Lori</p>
        <p style="margin-top:0.75rem;font-size:0.875rem;color:rgba(255,255,255,0.55);max-width:260px;">
          Independent editorial platform for Lori Province, Northern Armenia.
        </p>
      </div>
      <nav class="footer-nav" id="footer-nav" aria-label="Footer navigation"></nav>
    </div>
    <div class="container footer-copy">
      <p>&copy; 2026 Explore Lori. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/nav.js"></script>
  <script>
  (function () {
    'use strict';

    var TYPES = {
      longread:    'Long Read',
      photography: 'Photography Essay',
      fieldnotes:  'Field Notes',
      reportage:   'Reportage'
    };

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function capFirst(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function typeLabel(id) {
      return TYPES[id] || capFirst(id);
    }

    function formatDate(iso) {
      var d = new Date(iso);
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      return months[d.getMonth()] + ' ' + d.getFullYear();
    }


    function renderVideoBlock(b) {
      var src = b.src || '';
      var caption = b.caption ? '<p class="story-video-caption">' + escHtml(b.caption) + '</p>' : '';
      if (b.provider === 'youtube' || b.provider === 'vimeo') {
        var embedUrl = '';
        if (b.provider === 'youtube') {
          var ytId = src.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
          embedUrl = ytId ? 'https://www.youtube.com/embed/' + ytId[1] : src;
        } else {
          var vmId = src.match(/vimeo\.com\/(\d+)/);
          embedUrl = vmId ? 'https://player.vimeo.com/video/' + vmId[1] : src;
        }
        return '<div class="story-video-wrap">' +
          '<div class="story-video-embed"><iframe src="' + escHtml(embedUrl) + '" allowfullscreen></iframe></div>' +
          caption + '</div>';
      }
      if (b.display === 'ambient') {
        return '<div class="story-video-wrap">' +
          '<div class="story-video-ambient">' +
          '<video autoplay muted loop playsinline src="' + escHtml(src) + '"></video>' +
          (b.overlay_text ? '<div class="story-video-ambient-overlay"><span>' + escHtml(b.overlay_text) + '</span></div>' : '') +
          '</div>' + caption + '</div>';
      }
      if (b.display === 'shorts') {
        return '<div class="story-video-wrap" style="display:flex;justify-content:center">' +
          '<video class="story-video-shorts" controls src="' + escHtml(src) + '"></video>' +
          caption + '</div>';
      }
      return '<div class="story-video-wrap">' +
        '<video class="story-video-self" controls src="' + escHtml(src) + '"></video>' +
        caption + '</div>';
    }

    function renderMapBlock(b) {
      var locId = b.location_id || '';
      var href = locId ? '/discover/?id=' + encodeURIComponent(locId) : '/discover/';
      return '<a class="story-map-block" href="' + escHtml(href) + '">' +
        '<div class="story-map-block-icon">\uD83D\uDCCD</div>' +
        '<div class="story-map-block-text">' +
        '<div class="story-map-block-label">View on map</div>' +
        (locId ? '<div class="story-map-block-name">' + escHtml(locId.replace(/-/g, ' ')) + '</div>' : '') +
        (b.caption ? '<div class="story-map-block-caption">' + escHtml(b.caption) + '</div>' : '') +
        '</div>' +
        '<div class="story-map-block-arrow">\u2192</div>' +
        '</a>';
    }

    function renderStory(story) {
      var main = document.getElementById('story-main');

      // Update page title
      document.title = escHtml(story.title) + ' — Explore Lori';

      main.innerHTML =
        // Hero
        '<div class="story-hero">' +
          '<div class="story-hero-bg" style="background:' + escHtml(story.image_gradient) + '">' +
            (story.image_path ? '<img src="' + escHtml(story.image_path) + '" alt="' + escHtml(story.title) + '" loading="eager" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display=\'none\'">' : '') +
          '</div>' +
          '<a class="hero-back" href="/stories/">\u2190 The Chronicle</a>' +
          '<span class="hero-season-badge">' + escHtml(capFirst(story.season)) + '</span>' +
          (story.image_caption ? '<span class="hero-caption">' + escHtml(story.image_caption) + '</span>' : '') +
        '</div>' +

        // Body
        '<article>' +
          '<div class="story-body">' +
            '<div class="story-meta-row">' +
              '<span class="pillar-tag">' + escHtml(capFirst(story.pillar)) + '</span>' +
              '<span class="dot">\u25cf</span>' +
              '<span class="cbadge" style="background:' + escHtml(story.circuit_color) + '">' + escHtml(story.circuit_name) + '</span>' +
              '<span class="dot">\u25cf</span>' +
              '<span class="sbadge">' + escHtml(capFirst(story.season)) + '</span>' +
              '<span class="dot">\u25cf</span>' +
              '<span class="sbadge">' + escHtml(typeLabel(story.type)) + '</span>' +
              '<span class="story-date">' + escHtml(String(story.read_time)) + ' min \u00b7 ' + escHtml(formatDate(story.date)) + '</span>' +
            '</div>' +
            '<h1 class="story-title">' + escHtml(story.title) + '</h1>' +
            '<p class="story-lede">' + escHtml(story.excerpt) + '</p>' +
            (function() {
              // If story has managed blocks, render them
              if (story.blocks && story.blocks.length > 0) {
                return '<div class="story-prose">' +
                  story.blocks.map(function(b) {
                    if (b.type === 'text')
                      return '<p>' + escHtml(b.content || '') + '</p>';
                    if (b.type === 'pullquote')
                      return '<blockquote class="pull-quote">' + escHtml(b.content || '') + '</blockquote>';
                    if (b.type === 'image')
                      return '<figure class="story-block-fig">' +
                        '<img src="' + escHtml(b.src || '') + '" alt="' + escHtml(b.caption || '') + '" loading="lazy">' +
                        (b.caption ? '<figcaption>' + escHtml(b.caption) + '</figcaption>' : '') +
                        '</figure>';
                    if (b.type === 'heading')
                      return '<h' + (b.level || 2) + '>' + escHtml(b.content || '') + '</h' + (b.level || 2) + '>';
                    if (b.type === 'gallery' && b.images && b.images.length)
                      return '<div class="story-gallery cols-' + (b.columns || 3) + '">' +
                        b.images.map(function(img) {
                          return '<figure>' +
                            '<img src="' + escHtml(img.src || '') + '" alt="' + escHtml(img.caption || '') + '" loading="lazy">' +
                            (img.caption ? '<figcaption>' + escHtml(img.caption) + '</figcaption>' : '') +
                            '</figure>';
                        }).join('') + '</div>';
                    if (b.type === 'video') return renderVideoBlock(b);
                    if (b.type === 'divider')
                      return b.style === 'ornament'
                        ? '<div class="story-divider-ornament">\u2726 \u2726 \u2726</div>'
                        : '<hr class="story-divider-line">';
                    if (b.type === 'callout')
                      return '<div class="story-callout ' + escHtml(b.style || 'note') + '">' +
                        '<div class="story-callout-label">' + escHtml(b.label || 'Note') + '</div>' +
                        '<p style="margin:0">' + escHtml(b.content || '') + '</p>' +
                        '</div>';
                    if (b.type === 'map') return renderMapBlock(b);
                    if (b.type === 'fullwidth' && b.src)
                      return '<figure class="story-fullwidth">' +
                        '<img src="' + escHtml(b.src) + '" alt="' + escHtml(b.caption || '') + '" loading="lazy">' +
                        (b.overlay_text ? '<div class="story-fullwidth-overlay"><span>' + escHtml(b.overlay_text) + '</span></div>' : '') +
                        (b.caption ? '<figcaption>' + escHtml(b.caption) + '</figcaption>' : '') +
                        '</figure>';
                    if (b.type === 'audio' && b.src)
                      return '<div class="story-audio-block">' +
                        '<div class="story-audio-label">Listen</div>' +
                        (b.title ? '<div class="story-audio-title">' + escHtml(b.title) + (b.duration ? ' <span style="font-size:0.85rem;color:var(--slate)">(' + escHtml(b.duration) + ')</span>' : '') + '</div>' : '') +
                        '<audio controls src="' + escHtml(b.src) + '"></audio>' +
                        '</div>';
                    if (b.type === 'beforeafter' && b.before_src && b.after_src)
                      return '<div class="story-beforeafter" data-ba="1">' +
                        '<div class="story-ba-before"><img class="story-ba-img" src="' + escHtml(b.before_src) + '" alt="' + escHtml(b.before_label || 'Before') + '" loading="lazy"></div>' +
                        '<div class="story-ba-after" style="width:50%"><img src="' + escHtml(b.after_src) + '" alt="' + escHtml(b.after_label || 'After') + '" loading="lazy"></div>' +
                        '<div class="story-ba-handle" style="left:50%"></div>' +
                        '<div class="story-ba-labels">' +
                        '<span class="story-ba-label">' + escHtml(b.before_label || 'Before') + '</span>' +
                        '<span class="story-ba-label">' + escHtml(b.after_label || 'After') + '</span>' +
                        '</div>' +
                        '</div>';
                    return '';
                  }).join('') +
                '</div>';
              }
              return '<div class="story-prose"><p>No content yet.</p></div>';
            })() +
          '</div>' +
        '</article>' +

        // Related (placeholder — filled after fetch)
        '<section class="related-section" id="related-section" style="display:none">' +
          '<div class="container">' +
            '<p class="related-label">More from Lori</p>' +
            '<div class="related-grid" id="related-grid"></div>' +
          '</div>' +
        '</section>';
    }

    function renderRelated(currentStory, allStories) {
      var related = allStories.filter(function (s) {
        return s.slug !== currentStory.slug &&
          (s.circuit === currentStory.circuit || s.pillar === currentStory.pillar);
      }).slice(0, 3);

      if (related.length === 0) return;

      var grid = document.getElementById('related-grid');
      var section = document.getElementById('related-section');
      if (!grid || !section) return;

      grid.innerHTML = related.map(function (s) {
        var imgContent = s.image_path
          ? '<img src="' + escHtml(s.image_path) + '" alt="' + escHtml(s.title) + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display=\'none\'">'
          : '';
        return '<a class="card-a" href="/story/?slug=' + escHtml(s.slug) + '">' +
          '<div class="card-a-img" style="background:' + escHtml(s.image_gradient) + ';background-size:cover">' +
            imgContent +
            '<span class="card-a-season">' + escHtml(capFirst(s.season)) + '</span>' +
          '</div>' +
          '<div class="card-a-body">' +
            '<div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">' +
              '<span class="pillar-tag" style="font-size:0.65rem">' + escHtml(capFirst(s.pillar)) + '</span>' +
              '<span class="dot">\u25cf</span>' +
              '<span class="cbadge" style="background:' + escHtml(s.circuit_color) + ';font-size:0.65rem">' + escHtml(s.circuit_name) + '</span>' +
            '</div>' +
            '<h3 class="card-a-title">' + escHtml(s.title) + '</h3>' +
            '<p class="card-a-excerpt">' + escHtml(s.excerpt) + '</p>' +
            '<div class="card-a-footer">' +
              '<span class="card-a-meta-sm">' + escHtml(String(s.read_time)) + ' min \u00b7 ' + escHtml(typeLabel(s.type)) + '</span>' +
              '<span class="read-link-sm">Read \u2192</span>' +
            '</div>' +
          '</div>' +
        '</a>';
      }).join('');

      section.style.display = 'block';
    }

    function showError(msg) {
      document.getElementById('story-main').innerHTML =
        '<div class="story-error">' +
          '<h1>Story not found</h1>' +
          '<p>' + escHtml(msg) + '</p>' +
          '<a href="/stories/" class="btn btn-primary">Back to The Chronicle</a>' +
        '</div>';
    }

    function initBeforeAfter() {
      document.querySelectorAll('[data-ba="1"]').forEach(function(el) {
        var handle = el.querySelector('.story-ba-handle');
        var after  = el.querySelector('.story-ba-after');
        if (!handle || !after) return;
        function setPos(x) {
          var rect = el.getBoundingClientRect();
          var pct = Math.max(0, Math.min(100, (x - rect.left) / rect.width * 100));
          after.style.width = pct + '%';
          handle.style.left = pct + '%';
        }
        handle.addEventListener('mousedown', function(e) {
          e.preventDefault();
          function onMove(e) { setPos(e.clientX); }
          function onUp()   { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
        handle.addEventListener('touchstart', function(e) {
          e.preventDefault();
          function onMove(e) { setPos(e.touches[0].clientX); }
          function onEnd()   { document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd); }
          document.addEventListener('touchmove', onMove, { passive: false });
          document.addEventListener('touchend', onEnd);
        }, { passive: false });
      });
    }

    // ── INIT ──────────────────────────────────────────────────────────────────
    var slug = new URLSearchParams(window.location.search).get('slug');

    if (!slug) {
      window.location.replace('/stories/');
      return;
    }

    fetch('/data/stories.json')
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (stories) {
        var story = null;
        for (var i = 0; i < stories.length; i++) {
          if (stories[i].slug === slug) { story = stories[i]; break; }
        }

        if (!story) {
          showError('No story found with the slug \u201c' + slug + '\u201d.');
          return;
        }

        renderStory(story);
        initBeforeAfter();
        renderRelated(story, stories);
      })
      .catch(function (err) {
        console.error('Story load error:', err);
        showError('Could not load story data. Please try again.');
      });

  })();
  </script>
</body>
</html>
