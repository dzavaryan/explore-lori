<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover — Lori Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-logo">Lori Admin</div>
    <nav class="sidebar-nav">
      <a href="/">Dashboard</a>
      <a href="/discover.html" class="active">Discover</a>
      <a href="/stories.html">Stories</a>
      <a href="/events.html">Events</a>
      <a href="/stays.html">Stays</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="admin-content">

    <div class="page-header">
      <h1 class="page-title">Discover</h1>
      <button class="btn btn--primary" id="btnNew">+ New Item</button>
    </div>

    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Type</th>
          <th>Region</th>
          <th>Season</th>
          <th>Difficulty</th>
          <th>Circuit</th>
          <th>Featured</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"><!-- filled by JS --></tbody>
    </table>

    <!-- Edit Panel -->
    <aside class="edit-panel" id="editPanel">
      <div class="edit-panel__header">
        <h2 id="panelTitle">New Item</h2>
        <button class="btn btn--sm" id="btnClose">&#x2715;</button>
      </div>
      <div class="edit-panel__body">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" id="fTitle" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Slug</label>
          <input class="form-input" id="fSlug" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Excerpt</label>
          <textarea class="form-textarea" id="fExcerpt"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="fType">
            <option value="place">Place</option>
            <option value="trail">Trail</option>
            <option value="village">Village</option>
            <option value="experience">Experience</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Region</label>
          <input class="form-input" id="fRegion" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Season</label>
          <select class="form-select" id="fSeason">
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="autumn">Autumn</option>
            <option value="winter">Winter</option>
            <option value="all">All year</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Difficulty</label>
          <select class="form-select" id="fDifficulty">
            <option value="easy">Easy</option>
            <option value="moderate">Moderate</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Circuit</label>
          <select class="form-select" id="fCircuit">
            <option value="monastery">Monastery Plateau</option>
            <option value="fortress">Fortress Plateau</option>
            <option value="gorges">Deep Gorges</option>
            <option value="steppe">Northern Steppe</option>
            <option value="poets">Poet's Highlands</option>
            <option value="molokan">Molokan Highs</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Duration</label>
          <input class="form-input" id="fDuration" type="text" placeholder="e.g. 3–4 hours">
        </div>
        <div class="form-group">
          <label class="form-label">Distance</label>
          <input class="form-input" id="fDistance" type="text" placeholder="e.g. 8 km">
        </div>
        <div class="form-group">
          <label class="form-label">Elevation</label>
          <input class="form-input" id="fElevation" type="text" placeholder="e.g. +320m">
        </div>
        <div class="form-group">
          <label class="form-label">Image path</label>
          <img class="img-preview" id="fImgPreview" alt="Preview">
          <input class="form-input" id="fImage" type="text" placeholder="/images/...">
          <input type="file" id="fImageUpload" accept="image/*" style="margin-top:8px">
        </div>
        <div class="form-group">
          <label class="form-label"><input type="checkbox" id="fFeatured"> Featured</label>
        </div>
      </div>
      <div class="edit-panel__footer">
        <button class="btn btn--primary" id="btnSave">Save Item</button>
        <button class="btn btn--secondary" id="btnSaveRebuild">Save &amp; Rebuild</button>
        <button class="btn btn--danger" id="btnDelete" style="margin-left:auto">Delete</button>
      </div>
    </aside>

  </main>

</div>

<div class="overlay" id="overlay"></div>

<script src="/js/admin-core.js"></script>
<script src="/js/discover-ui.js"></script>
</body>
</html>
