<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Lori Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">

  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-logo">Lori Admin</div>
    <nav class="sidebar-nav">
      <a href="/">Dashboard</a>
      <a href="/discover.html">Discover</a>
      <a href="/stories.html">Stories</a>
      <a href="/events.html" class="active">Events</a>
      <a href="/stays.html">Stays</a>
    </nav>
  </aside>

  <main class="admin-content">
    <div class="page-header">
      <h1 class="page-title">Events</h1>
      <button class="btn btn--primary" id="btnNew">+ New Event</button>
    </div>

    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>Title</th><th>Category</th><th>Date</th><th>Location</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <aside class="edit-panel" id="editPanel">
      <div class="edit-panel__header">
        <h2 id="panelTitle">New Event</h2>
        <button class="btn btn--sm" id="btnClose">✕</button>
      </div>
      <div class="edit-panel__body">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" id="fTitle" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="fCategory">
            <option value="Food &amp; Foraging">Food &amp; Foraging</option>
            <option value="Food &amp; Drink">Food &amp; Drink</option>
            <option value="Arts &amp; Culture">Arts &amp; Culture</option>
            <option value="Music">Music</option>
            <option value="Workshops">Workshops</option>
            <option value="Markets">Markets</option>
            <option value="Festivals">Festivals</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Day</label>
            <input class="form-input" id="fDay" type="text" maxlength="2" placeholder="12">
          </div>
          <div class="form-group">
            <label class="form-label">Month</label>
            <select class="form-select" id="fMonth">
              <option value="Jan">January</option><option value="Feb">February</option>
              <option value="Mar">March</option><option value="Apr">April</option>
              <option value="May">May</option><option value="Jun">June</option>
              <option value="Jul">July</option><option value="Aug">August</option>
              <option value="Sep">September</option><option value="Oct">October</option>
              <option value="Nov">November</option><option value="Dec">December</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Year</label>
            <input class="form-input" id="fYear" type="number" placeholder="2026">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" id="fLocation" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="fDescription"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">URL</label>
          <input class="form-input" id="fUrl" type="text" placeholder="https://…">
        </div>
        <div class="form-group">
          <label class="form-label">Image path</label>
          <img class="img-preview" id="fImgPreview" alt="Preview">
          <input class="form-input" id="fImage" type="text" placeholder="/images/…">
          <input type="file" id="fImageUpload" accept="image/*" style="margin-top:8px">
        </div>
      </div>
      <div class="edit-panel__footer">
        <button class="btn btn--primary" id="btnSave">Save Event</button>
        <button class="btn btn--secondary" id="btnSaveRebuild">Save &amp; Rebuild</button>
        <button class="btn btn--danger" id="btnDelete" style="margin-left:auto">Delete</button>
      </div>
    </aside>

  </main>

</div>

<div class="overlay" id="overlay"></div>

<script src="/js/admin-core.js"></script>
<script src="/js/events-ui.js"></script>
</body>
</html>
