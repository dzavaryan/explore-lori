<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories — Lori Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-logo">Lori Admin</div>
    <nav class="sidebar-nav">
      <a href="/">Dashboard</a>
      <a href="/discover.html">Discover</a>
      <a href="/stories.html" class="active">Stories</a>
      <a href="/events.html">Events</a>
      <a href="/stays.html">Stays</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="admin-content">

    <div class="page-header">
      <h1 class="page-title">Stories</h1>
      <button class="btn btn--primary" id="btnNew">+ New Item</button>
    </div>

    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Pillar</th>
          <th>Author</th>
          <th>Read time</th>
          <th>Featured</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"><!-- filled by JS --></tbody>
    </table>

    <!-- Edit Panel -->
    <aside class="edit-panel" id="editPanel">
      <div class="edit-panel__header">
        <h2 id="panelTitle">New Item</h2>
        <button class="btn btn--sm" id="btnClose">&#x2715;</button>
      </div>
      <div class="edit-panel__body">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" id="fTitle" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Slug</label>
          <input class="form-input" id="fSlug" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Excerpt</label>
          <textarea class="form-textarea" id="fExcerpt"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Author</label>
          <input class="form-input" id="fAuthor" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">Read Time</label>
          <input class="form-input" id="fReadTime" type="text" placeholder="5 min read">
        </div>
        <div class="form-group">
          <label class="form-label">Pillar</label>
          <select class="form-select" id="fPillar">
            <option value="trails">Trails &amp; Nature</option>
            <option value="culture">Culture &amp; History</option>
            <option value="food">Food &amp; Foraging</option>
            <option value="people">Local Voices</option>
            <option value="seasons">Seasons &amp; Weather</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Season</label>
          <select class="form-select" id="fSeason">
            <option value="spring">Spring</option>
            <option value="summer">Summer</option>
            <option value="autumn">Autumn</option>
            <option value="winter">Winter</option>
            <option value="all">All year</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Image path</label>
          <img class="img-preview" id="fImgPreview" alt="Preview">
          <input class="form-input" id="fImage" type="text" placeholder="/images/...">
          <input type="file" id="fImageUpload" accept="image/*" style="margin-top:8px">
        </div>
        <div class="form-group">
          <label class="form-label"><input type="checkbox" id="fFeatured"> Featured</label>
        </div>
      </div>
      <div class="edit-panel__footer">
        <button class="btn btn--primary" id="btnSave">Save Item</button>
        <button class="btn btn--secondary" id="btnSaveRebuild">Save &amp; Rebuild</button>
        <button class="btn btn--danger" id="btnDelete" style="margin-left:auto">Delete</button>
      </div>
    </aside>

  </main>

</div>

<div class="overlay" id="overlay"></div>

<script src="/js/admin-core.js"></script>
<script src="/js/stories-ui.js"></script>
</body>
</html>
